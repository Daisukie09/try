<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VincentMovie - Watch Movies & TV Shows</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="#" class="logo" onclick="navigateTo('home')">
                <i class="fas fa-film"></i>
                <span>Vincent<span class="accent">Movie</span></span>
            </a>
            <div class="nav-links">
                <a href="#" class="nav-link active" data-page="home" onclick="navigateTo('home')">
                    <i class="fas fa-home"></i> Home
                </a>
                <a href="#" class="nav-link" data-page="trending" onclick="navigateTo('trending')">
                    <i class="fas fa-fire"></i> Trending
                </a>
            </div>
            <div class="nav-right">
                <button class="search-btn" onclick="toggleSearch()">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>
        <div class="search-overlay" id="searchOverlay">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search movies & TV shows..." autocomplete="off">
                <button class="search-close" onclick="toggleSearch()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="app">
        <!-- Home Page -->
        <div id="page-home" class="page active">
            <!-- Hero Banner / Carousel -->
            <section class="hero-section" id="heroBanner">
                <div class="hero-slider" id="heroSlider"></div>
                <div class="hero-controls">
                    <button class="hero-btn hero-prev" onclick="slideHero(-1)">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <div class="hero-dots" id="heroDots"></div>
                    <button class="hero-btn hero-next" onclick="slideHero(1)">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </section>

            <!-- Platform Tags -->
            <section class="platforms-section" id="platformsSection">
                <div class="container">
                    <div class="platforms-scroll" id="platformsList"></div>
                </div>
            </section>

            <!-- Content Rows -->
            <div id="homeContent" class="content-rows"></div>
        </div>

        <!-- Trending Page -->
        <div id="page-trending" class="page">
            <div class="container">
                <div class="page-header">
                    <h1><i class="fas fa-fire"></i> Trending Now</h1>
                </div>
                <div class="movie-grid" id="trendingGrid"></div>
                <div class="load-more-container">
                    <button class="load-more-btn" id="loadMoreTrending" onclick="loadMoreTrending()">
                        <i class="fas fa-plus"></i> Load More
                    </button>
                </div>
            </div>
        </div>

        <!-- Detail Page -->
        <div id="page-detail" class="page">
            <div id="detailContent"></div>
        </div>

        <!-- Player Page -->
        <div id="page-player" class="page">
            <div id="playerContent"></div>
        </div>
    </main>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader">
            <div class="loader-film">
                <i class="fas fa-film fa-spin"></i>
            </div>
            <p>Loading...</p>
        </div>
    </div>

    <!-- Back to Top -->
    <button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <i class="fas fa-chevron-up"></i>
    </button>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <a href="#" class="logo" onclick="navigateTo('home')">
                        <i class="fas fa-film"></i>
                        <span>Vincent<span class="accent">Movie</span></span>
                    </a>
                    <p>Your ultimate destination for movies and TV shows. Stream the latest content from around the world.</p>
                </div>
                <div class="footer-links">
                    <h4>Quick Links</h4>
                    <a href="#" onclick="navigateTo('home')">Home</a>
                    <a href="#" onclick="navigateTo('trending')">Trending</a>
                </div>
                <div class="footer-links">
                    <h4>Platforms</h4>
                    <a href="#">Netflix</a>
                    <a href="#">Disney+</a>
                    <a href="#">Prime Video</a>
                    <a href="#">Apple TV+</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 VincentMovie. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
